version: '3.8'

services:
  # Main GPU Container Orchestration Scheduler
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gpu-scheduler
    environment:
      - PYTHONUNBUFFERED=1
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility

    # GPU support (requires nvidia-docker)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

    # Volume mounts for reports and logs
    volumes:
      - ./reports:/app/reports
      - ./logs:/app/logs
      - ./config.ini:/app/config.ini:ro

    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    # Restart policy
    restart: unless-stopped

    # Network configuration
    networks:
      - container-network

    # Health check
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: Prometheus monitoring
  # prometheus:
  #   image: prom/prometheus:latest
  #   container_name: prometheus-monitor
  #   volumes:
  #     - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
  #     - prometheus_data:/prometheus
  #   ports:
  #     - "9090:9090"
  #   command:
  #     - '--config.file=/etc/prometheus/prometheus.yml'
  #     - '--storage.tsdb.path=/prometheus'
  #   restart: unless-stopped
  #   networks:
  #     - container-network
  #   logging:
  #     driver: "json-file"
  #     options:
  #       max-size: "10m"
  #       max-file: "3"

volumes:
  prometheus_data:
    driver: local

networks:
  container-network:
    driver: bridge

