[SCHEDULER]
# Scheduler configuration
# CONSTRAINT: Total GPU memory must not exceed 4096 MB
# MATHEMATICAL SPECIFICATION  Base Memory = 862MB, Duration = 10min, Reset = 3
total_gpu_memory_mb = 4096
container_duration_seconds = 600
step_interval_seconds = 5
max_concurrent_containers = 3
memory_multiplier = 1.5
base_memory_mb = 862
simulation_duration_hours = 24
memory_multiplier_reset_interval = 3
worker_script = worker/worker.py

[WORKER]
# Worker process configuration
python_path = python
default_timeout_seconds = 600
memory_allocation_mode = gpu_with_cpu_fallback

[REPORTS]
# CSV Report generation
reports_directory = reports
generate_on_shutdown = true
report_formats = csv
include_memory_timeline = true
include_state_transitions = true
num_containers_to_analyze = 14

[MEMORY_MANAGER]
# Memory management settings
enable_pytorch_gpu = true
enable_cpu_fallback = true
memory_check_interval_seconds = 30
memory_threshold_percent = 95

[LOGGING]
# Logging configuration
log_level = INFO
log_format = %(asctime)s - %(name)s - %(levelname)s - %(message)s
log_to_file = false
log_file = scheduler.log

[ADVANCED]
# Advanced tuning parameters
watchdog_poll_interval_seconds = 10
zombie_grace_period_seconds = 30
oom_retry_count = 3
oom_retry_reset_after_successes = 3
max_queue_size = 100
